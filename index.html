<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RB Maintenance Dashboard</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }
    .box{
      background:white;
      border-radius:12px;
      padding:20px;
      box-shadow:0 2px 8px rgba(0,0,0,.1);
      max-width:900px;
      margin:auto;
    }
    h1{color:#0f172a}
    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      box-sizing:border-box;
    }
    button{
      background:#2563eb;
      color:white;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }
    th,td{
      border:1px solid #ddd;
      padding:10px;
      text-align:left;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>RB Maintenance Dashboard</h1>
  <p id="status">Memuat aplikasi...</p>

  <h3>Input Laporan</h3>
  <form id="reportForm">
    <input type="date" id="date" required>
    <input type="text" id="area" placeholder="Area" required>
    <input type="text" id="equipment" placeholder="Equipment" required>
    <input type="text" id="problem" placeholder="Masalah" required>
    <input type="text" id="pic" placeholder="PIC" required>
    <button type="submit">Simpan</button>
  </form>

  <h3>Data Laporan</h3>
  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Area</th>
        <th>Equipment</th>
        <th>Masalah</th>
        <th>PIC</th>
      </tr>
    </thead>
    <tbody id="reportRows"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyA107reAeDVJI78Yg94E7gJBYpbTHNUo6M',
  authDomain: 'maintenance-shift-app.firebaseapp.com',
  projectId: 'maintenance-shift-app',
  storageBucket: 'maintenance-shift-app.firebasestorage.app',
  messagingSenderId: '883647677547',
  appId: '1:883647677547:web:2191e8d1ba7faf7ea21d2e'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById('status').innerHTML =
  '<b style="color:green">🟢 Firebase connected</b>';

const form = document.getElementById('reportForm');
const rows = document.getElementById('reportRows');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  await addDoc(collection(db, 'laporan'), {
    date: document.getElementById('date').value,
    area: document.getElementById('area').value,
    equipment: document.getElementById('equipment').value,
    problem: document.getElementById('problem').value,
    pic: document.getElementById('pic').value,
    createdAt: serverTimestamp()
  });

  alert('Data berhasil disimpan');
  form.reset();
});

onSnapshot(collection(db, 'laporan'), (snapshot) => {
  const data = snapshot.docs.map(doc => doc.data());

  rows.innerHTML = data.map(r => `
    <tr>
      <td>${r.date || ''}</td>
      <td>${r.area || ''}</td>
      <td>${r.equipment || ''}</td>
      <td>${r.problem || ''}</td>
      <td>${r.pic || ''}</td>
    </tr>
  `).join('');
});
</script>

</body>
</html>
