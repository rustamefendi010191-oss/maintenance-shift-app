<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Sistem - Maintenance Shift</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#eef2f7;
}

.topbar{
  background:#0f4c5c;
  color:white;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:10px;
  background:white;
  color:#0f4c5c;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  padding:18px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

.tab{
  background:#d7dee8;
  border:none;
  border-radius:10px;
  padding:10px 16px;
  font-weight:700;
}

.tab.active{
  background:#0f4c5c;
  color:white;
}

.card{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(15,23,42,.08);
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.field label{
  display:block;
  font-size:13px;
  font-weight:700;
  margin-bottom:6px;
}

input, select{
  width:100%;
  padding:11px 12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  box-sizing:border-box;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">RBG</div>
    <div>
      <div style="font-size:28px;font-weight:800">Aplikasi Sistem</div>
      <div style="font-size:13px">Laporan Maintenance Shift</div>
    </div>
  </div>

  <div style="text-align:right;font-size:12px">
    <div><b>No. Dokumen:</b> FR-MRB-05</div>
    <div><b>Revisi:</b> 04 • Efektif: 01/04/2021</div>
  </div>

  <button style="background:#08313b;color:white;border:1px solid rgba(255,255,255,.4);border-radius:10px;padding:10px 14px;font-weight:700">
    Keluar
  </button>
</header>

<main class="container">

  <div class="tabs">
    <button class="tab">Dashboard</button>
    <button class="tab active">Input laporan</button>
    <button class="tab">Daftar laporan</button>
  </div>

  <section class="card">
    <h2 style="margin-top:0;color:#0f172a">Laporan permasalahan mesin</h2>

    <div class="form-grid">
      <div class="field">
        <label>Tanggal kejadian *</label>
        <input type="date">
      </div>

      <div class="field">
        <label>Plant *</label>
        <select><option>Pilih plant</option></select>
      </div>

      <div class="field">
        <label>Waktu shift *</label>
        <select><option>Pilih shift</option></select>
      </div>

      <div class="field">
        <label>Regu *</label>
        <select><option>Pilih regu</option></select>
      </div>

      <div class="field">
        <label>Mulai dikerjakan *</label>
        <input type="datetime-local">
      </div>

      <div class="field">
        <label>Selesai dikerjakan</label>
        <input type="datetime-local">
      </div>

      <div class="field">
        <label>Status mesin *</label>
        <select><option>Pilih status</option></select>
      </div>

      <div class="field">
        <label>Area *</label>
        <select><option>Pilih area</option></select>
      </div>

      <div class="field">
        <label>Sub area *</label>
        <select><option>Pilih sub area</option></select>
      </div>

      <div class="field">
        <label>Equipment *</label>
        <select><option>Pilih equipment</option></select>
      </div>

      <div class="field">
        <label>Status kejadian *</label>
        <select><option>Pilih status</option></select>
      </div>

      <div class="field">
        <label>Status perbaikan *</label>
        <select><option>Pilih status</option></select>
      </div>

      <div class="field">
        <label>PIC eksekusi *</label>
        <input placeholder="Nama PIC">
      </div>

      <div class="field">
        <label>Foto after perbaikan</label>
        <input type="file">
      </div>

      <div class="field">
        <label>Durasi</label>
        <input placeholder="Otomatis dari waktu mulai/selesai">
      </div>
    </div>
  </section>

</main>

</body>
</html>
