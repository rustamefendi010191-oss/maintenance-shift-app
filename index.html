  <!-- FIREBASE -->

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // GANTI DENGAN KONFIGURASI FIREBASE ANDA
    const firebaseConfig = {
      apiKey: 'ISI_API_KEY',
      authDomain: 'ISI_PROJECT.firebaseapp.com',
      projectId: 'ISI_PROJECT_ID',
      storageBucket: 'ISI_PROJECT.appspot.com',
      messagingSenderId: '123456789',
      appId: 'ISI_APP_ID'
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('form');
    const rows = document.getElementById('rows');
    const msg = document.getElementById('msg');

    let trendChart;

    // SIMPAN DATA
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        date: date.value,
        shift: shift.value,
        plant: plant.value,
        area: area.value,
        equipment: equipment.value,
        category: category.value,
        downtime: Number(downtime.value),
        pic: pic.value,
        remark: remark.value,
        createdAt: serverTimestamp()
      };

      try {
        await addDoc(collection(db, 'reports'), data);
        msg.innerHTML = '<b style="color:green">Data berhasil disimpan</b>';
        form.reset();
      } catch (err) {
        msg.innerHTML = '<b style="color:red">Gagal menyimpan data</b>';
        console.error(err);
      }
    });

    // REALTIME SYNC
    onSnapshot(collection(db, 'reports'), (snapshot) => {
      const data = snapshot.docs.map(d => d.data());

      // tabel
      rows.innerHTML = data.map(r => `
        <tr>
          <td>${r.date || ''}</td>
          <td>${r.plant || ''}</td>
          <td>${r.area || ''}</td>
          <td>${r.equipment || ''}</td>
          <td>${r.downtime || 0}</td>
          <td>${r.pic || ''}</td>
        </tr>
      `).join('');

      // KPI
      const totalDowntime = data.reduce((a,b)=>a + Number(b.downtime || 0),0);
      const totalEvent = data.length;
      const mttr = totalEvent ? (totalDowntime / totalEvent).toFixed(1) : 0;

      totalDowntimeEl.textContent = totalDowntime.toLocaleString() + ' menit';
      totalEventEl.textContent = totalEvent;
      mttrEl.textContent = mttr + ' menit';

      // chart
      const monthMap = {};
      data.forEach(r => {
        const m = (r.date || '').slice(0,7);
        monthMap[m] = (monthMap[m] || 0) + Number(r.downtime || 0);
      });

      const labels = Object.keys(monthMap).sort();
      const values = labels.map(k => monthMap[k]);

      if (trendChart) trendChart.destroy();

      trendChart = new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Downtime',
            data: values,
            borderWidth: 2,
            tension: 0.3
          }]
        }
      });
    });

    // EXPORT CSV
    window.downloadCsv = function(){
      const table = document.querySelector('table');
      let csv = [];
      for (const row of table.rows) {
        csv.push([...row.cells].map(td => `"${td.innerText}"`).join(';'));
      }
      const blob = new Blob([csv.join('\\n')], {type:'text/csv;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'downtime-report.csv';
      a.click();
    }
  </script>

</body>
