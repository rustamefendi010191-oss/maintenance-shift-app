<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maintenance Shift</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#eef2f7;margin:0}
.top{background:#0f4c5c;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:70px;height:70px;background:#fff;border-radius:14px;padding:5px;object-fit:contain}
.brand h1{margin:0;font-size:30px}
.brand p{margin:2px 0 0;font-size:13px}
.doc{font-size:12px;text-align:right}
.wrap{padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.k{background:#0f172a;color:#fff;border-radius:14px;padding:14px}
.k b{font-size:28px;display:block;margin-top:6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
label{font-weight:700;font-size:13px;margin-bottom:6px;display:block}
input,select,textarea{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
textarea{min-height:80px}
button{background:#2563eb;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:12px}
th{background:#0f4c5c;color:#fff;padding:10px;font-size:13px}
td{padding:10px;border-bottom:1px solid #e5e7eb}
.ts-control{min-height:44px;border-radius:10px!important}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <img src="logo-rbg.png" class="logo">
    <div>
      <h1>Aplikasi Sistem</h1>
      <p>Laporan Maintenance Shift</p>
    </div>
  </div>
  <div class="doc">
    <div><b>No. Dokumen:</b> FR-MRB-05</div>
    <div><b>Revisi:</b> 04 • Efektif: 01/04/2021</div>
  </div>
</div>

<div class="wrap">

  <div class="kpi">
    <div class="k">Total<b id="t">0</b></div>
    <div class="k">Open<b id="o">0</b></div>
    <div class="k">Progress<b id="p">0</b></div>
    <div class="k">Close<b id="c">0</b></div>
    <div class="k">MTTR<b id="m">0</b></div>
  </div>

  <div class="card">
    <h2>Laporan permasalahan mesin</h2>

    <form id="f">
      <div class="grid">

        <div><label>Tanggal</label><input type="date" id="date" required></div>

        <div><label>Plant</label>
          <select id="plant" required>
            <option value=""></option><option>RB1</option><option>RB2</option><option>RB3</option>
          </select>
        </div>

        <div><label>Shift</label>
          <select id="shift" required>
            <option value=""></option><option>A</option><option>B</option><option>C</option>
          </select>
        </div>

        <div><label>Regu</label>
          <select id="regu" required>
            <option value=""></option><option>Regu 1</option><option>Regu 2</option><option>Regu 3</option>
          </select>
        </div>

        <div><label>Mulai</label><input type="datetime-local" id="start" required></div>
        <div><label>Selesai</label><input type="datetime-local" id="end"></div>

        <div><label>Area</label>
          <select id="area" required>
            <option value=""></option>
            <option>Main Machine</option><option>Conveyor</option>
            <option>Hydraulic</option><option>Pneumatic</option><option>Utility</option>
          </select>
        </div>

        <div><label>Sub Area</label><select id="sub" required><option value=""></option></select></div>

        <div><label>Equipment</label><select id="eq" required><option value=""></option></select></div>

        <div><label>Status</label>
          <select id="status" required>
            <option value=""></option><option>Open</option><option>Progress</option><option>Close</option>
          </select>
        </div>

        <div><label>PIC</label><input id="pic" required></div>
        <div><label>Durasi (menit)</label><input id="dur" readonly></div>

      </div>

      <div style="margin-top:12px">
        <label>Deskripsi masalah</label>
        <textarea id="problem" required></textarea>
      </div>

      <div style="margin-top:14px">
        <button type="submit">💾 Simpan laporan</button>
      </div>
    </form>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>Daftar laporan realtime</h2>
    <table>
      <thead>
        <tr><th>Tanggal</th><th>Plant</th><th>Area</th><th>Equipment</th><th>Durasi</th><th>Status</th><th>PIC</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = initializeApp({
  apiKey:'AIzaSyA107reAeDVJI78Yg94E7gJBYpbTHNUo6M',
  authDomain:'maintenance-shift-app.firebaseapp.com',
  projectId:'maintenance-shift-app',
  storageBucket:'maintenance-shift-app.firebasestorage.app',
  messagingSenderId:'883647677547',
  appId:'1:883647677547:web:2191e8d1ba7faf7ea21d2e'
});

const db = getFirestore(app);

// Search dropdown
const areaTS = new TomSelect('#area',{create:false,placeholder:'Cari area...'});
const subTS  = new TomSelect('#sub',{create:false,placeholder:'Cari sub area...'});
const eqTS   = new TomSelect('#eq',{create:false,placeholder:'Cari equipment...'});

// Mapping
const subMap = {
  'Main Machine':['Chain Pusher','End Roll','Feeding','Stacker'],
  'Conveyor':['Infeed Conveyor','Outfeed Conveyor'],
  'Hydraulic':['Hydraulic Power Unit','Hydraulic Valve'],
  'Pneumatic':['Air Cylinder','Solenoid Valve'],
  'Utility':['Air Compressor','Cooling Tower']
};

const eqMap = {
  'Chain Pusher':['Chain','Sprocket','Bearing'],
  'End Roll':['Roll Shaft','Bearing'],
  'Feeding':['Motor','Gearbox','Sensor'],
  'Stacker':['Lift Cylinder','Limit Switch'],
  'Infeed Conveyor':['Conveyor Motor','Roller'],
  'Outfeed Conveyor':['Conveyor Motor','Roller'],
  'Hydraulic Power Unit':['Pump','Valve','Filter'],
  'Hydraulic Valve':['Directional Valve','Relief Valve'],
  'Air Cylinder':['Cylinder','Seal Kit'],
  'Solenoid Valve':['Valve','Coil'],
  'Air Compressor':['Compressor','Pressure Switch'],
  'Cooling Tower':['Fan Motor','Pump']
};

// Dynamic dropdown
areaTS.on('change',v=>{
  subTS.clear(); subTS.clearOptions();
  (subMap[v]||[]).forEach(x=>subTS.addOption({value:x,text:x}));
  subTS.refreshOptions(false);
  eqTS.clear(); eqTS.clearOptions();
});

subTS.on('change',v=>{
  eqTS.clear(); eqTS.clearOptions();
  (eqMap[v]||[]).forEach(x=>eqTS.addOption({value:x,text:x}));
  eqTS.refreshOptions(false);
});

// Durasi otomatis
const s = document.getElementById('start');
const e = document.getElementById('end');
const d = document.getElementById('dur');

function calc(){
  if(s.value && e.value){
    d.value = Math.max(0, Math.round((new Date(e.value)-new Date(s.value))/60000));
  }
}
s.onchange = calc;
e.onchange = calc;

// Simpan realtime
document.getElementById('f').addEventListener('submit', async ev => {
  ev.preventDefault();

  await addDoc(collection(db,'laporan'),{
    date:date.value,
    plant:plant.value,
    shift:shift.value,
    regu:regu.value,
    start:s.value,
    end:e.value,
    area:areaTS.getValue(),
    sub:subTS.getValue(),
    equipment:eqTS.getValue(),
    status:status.value,
    pic:pic.value,
    duration:Number(d.value||0),
    problem:problem.value,
    createdAt:serverTimestamp()
  });

  alert('Laporan berhasil disimpan');
  ev.target.reset();
  subTS.clear(); subTS.clearOptions();
  eqTS.clear(); eqTS.clearOptions();
});

// Realtime table + KPI
onSnapshot(collection(db,'laporan'), snap => {
  const data = snap.docs.map(x=>x.data());

  rows.innerHTML = data.map(r=>`
    <tr>
      <td>${r.date||''}</td>
      <td>${r.plant||''}</td>
      <td>${r.area||''}</td>
      <td>${r.equipment||''}</td>
      <td>${r.duration||0} menit</td>
      <td>${r.status||''}</td>
      <td>${r.pic||''}</td>
    </tr>
  `).join('');

  t.textContent = data.length;
  o.textContent = data.filter(x=>x.status==='Open').length;
  p.textContent = data.filter(x=>x.status==='Progress').length;
  c.textContent = data.filter(x=>x.status==='Close').length;
  m.textContent = data.length ? (data.reduce((a,b)=>a+Number(b.duration||0),0)/data.length).toFixed(1) : 0;
});
</script>

</body>
</html>
