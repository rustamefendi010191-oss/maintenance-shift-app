<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyA107reAeDVJI78Yg94E7gJBYpbTHNUo6M',
  authDomain: 'maintenance-shift-app.firebaseapp.com',
  projectId: 'maintenance-shift-app',
  storageBucket: 'maintenance-shift-app.firebasestorage.app',
  messagingSenderId: '883647677547',
  appId: '1:883647677547:web:2191e8d1ba7faf7ea21d2e'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log('Firebase connected');

const form = document.getElementById('reportForm');
const reportRows = document.getElementById('reportRows');
const metrics = document.getElementById('metrics');

let laporanData = [];

// Simpan data
if (form) {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
      date: document.getElementById('date')?.value || '',
      plant: document.getElementById('plant')?.value || '',
      shift: document.getElementById('shift')?.value || '',
      team: document.getElementById('team')?.value || '',
      area: document.getElementById('area')?.value || '',
      subarea: document.getElementById('subarea')?.value || '',
      equipment: document.getElementById('equipment')?.value || '',
      problem: document.getElementById('problem')?.value || '',
      action: document.getElementById('action')?.value || '',
      repair: document.getElementById('repair')?.value || '',
      machineStatus: document.getElementById('machineStatus')?.value || '',
      incident: document.getElementById('incident')?.value || '',
      pic: document.getElementById('pic')?.value || '',
      createdAt: serverTimestamp()
    };

    try {
      await addDoc(collection(db, 'laporan'), data);
      alert('Data berhasil disimpan');
      form.reset();
    } catch (err) {
      console.error(err);
      alert('Gagal menyimpan data');
    }
  });
}

// Realtime sync
onSnapshot(collection(db, 'laporan'), (snapshot) => {
  laporanData = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  render();
});

function render() {
  if (metrics) {
    metrics.innerHTML = `
      <div class="card metric"><span>Total laporan</span><b>${laporanData.length}</b></div>
      <div class="card metric"><span>Open</span><b>${laporanData.filter(r => r.repair !== 'Close').length}</b></div>
    `;
  }

  if (reportRows) {
    reportRows.innerHTML = laporanData.map(r => `
      <tr>
        <td>${r.date || ''}</td>
        <td>${r.area || ''}</td>
        <td>${r.equipment || ''}</td>
        <td>${r.problem || ''}</td>
        <td>${r.repair || ''}</td>
        <td>${r.pic || ''}</td>
      </tr>
    `).join('');
  }
}
</script>
